name: Tests and Quality Checks

on:
  push:
    branches: [ "main" ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23.2'

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Run go vet
      run: go vet ./...

    - name: Run go fmt check
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Go code is not formatted:"
          gofmt -d .
          exit 1
        fi

    - name: Build main application
      run: go build -v -o /tmp/notification-system main.go

    - name: Build all plugins
      run: |
        mkdir -p /tmp/plugins
        for plugin in plugins/*/; do
          plugin_name=$(basename "$plugin")
          echo "Building plugin: $plugin_name"
          go build -buildmode=plugin -o "/tmp/plugins/${plugin_name}.so" "${plugin}${plugin_name}.go"
        done

    - name: Check for TODO/FIXME comments
      run: |
        if grep -r "TODO\|FIXME" --include="*.go" --exclude-dir=vendor .; then
          echo "Warning: Found TODO/FIXME comments in code"
          exit 0  # Don't fail, just warn
        fi

    - name: Run tests (when they exist)
      run: |
        if go list ./... | grep -q .; then
          go test -v -race -coverprofile=coverage.out ./...
        else
          echo "No tests found - this is expected for now"
        fi
