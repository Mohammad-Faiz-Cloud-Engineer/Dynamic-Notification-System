name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Run go vet
      run: go vet ./...

    - name: Check formatting
      run: |
        unformatted=$(gofmt -l .)
        if [ -n "$unformatted" ]; then
          echo "The following files are not formatted:"
          echo "$unformatted"
          echo "Please run: gofmt -w ."
          exit 1
        fi

    - name: Build main application
      run: |
        mkdir -p build
        go build -v -o build/notification-system main.go

    - name: Build plugins
      run: |
        mkdir -p build/plugins
        
        # Build each plugin individually with error handling
        for plugin_dir in plugins/*/; do
          if [ -d "$plugin_dir" ]; then
            plugin_name=$(basename "$plugin_dir")
            plugin_file="${plugin_dir}${plugin_name}.go"
            
            if [ -f "$plugin_file" ]; then
              echo "Building plugin: $plugin_name"
              go build -buildmode=plugin -o "build/plugins/${plugin_name}.so" "$plugin_file" || {
                echo "Failed to build plugin: $plugin_name"
                exit 1
              }
            else
              echo "Warning: Plugin file not found: $plugin_file"
            fi
          fi
        done

    - name: List build artifacts
      run: |
        echo "Main application:"
        ls -lh build/notification-system
        echo ""
        echo "Plugins:"
        ls -lh build/plugins/

    - name: Run tests
      run: |
        # Check if any test files exist
        if find . -name "*_test.go" -type f | grep -q .; then
          echo "Running tests..."
          go test -v -race ./...
        else
          echo "No test files found - skipping tests"
        fi

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: build-artifacts
        path: build/
        retention-days: 7
